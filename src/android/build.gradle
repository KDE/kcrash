buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:@Gradle_ANDROID_GRADLE_PLUGIN_VERSION@'
    }
}

repositories {
    google()
    mavenCentral()
}

apply plugin: 'com.android.library'

dependencies {
    implementation 'io.sentry:sentry-android-core:8.43.0'
}

android {
    buildToolsVersion '@ANDROID_SDK_BUILD_TOOLS_REVISION@'
    compileSdkVersion @ANDROID_SDK_COMPILE_API@

    sourceSets {
        main {
            manifest.srcFile '@CMAKE_CURRENT_SOURCE_DIR@/AndroidManifest.xml'
            java.srcDirs = ['@CMAKE_CURRENT_SOURCE_DIR@/src/org']
            res.srcDirs = ['@CMAKE_CURRENT_SOURCE_DIR@/res']
       }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    lintOptions {
        abortOnError false
    }

    defaultConfig {
        minSdkVersion @ANDROID_API_LEVEL@
        targetSdkVersion @ANDROID_SDK_COMPILE_API@
        namespace "org.kde.crash"
    }
}
